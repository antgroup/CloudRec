title = "CloudRec secret scan"

[extend]
useDefault = true

[[allowlists]]
description = "Go module checksums are dependency content hashes, not committed cloud credentials."
paths = [
  '''(^|/)go\.sum$''',
]

[[allowlists]]
description = "Synthetic rule fixtures and sample packs contain generated placeholder field values that trigger generic-api-key false positives."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(^|/)rules/[^/]+/.*/input\.json$''',
  '''(^|/)lite/rules/.*/(input|examples)\.json$''',
  '''(^|/)lite/samples/.+\.json$''',
]
regexes = [
  '''(?i)(tagkey|clienttoken|accessgroupname|password_requirements|password_expires_at|oauth2clientid|keyalgorithm|keytype|access|key)"\s*:\s*"''',
]

[[allowlists]]
description = "Minified frontend bundle property names that are not secrets."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(^|/)app/bootstrap/src/main/resources/static/.*\.js$''',
  '''(^|/)app/bootstrap/target/classes/static/.*\.js$''',
]
regexes = [
  '''(?i)(prepareComponentToken|columnsKey|tabKey|[A-Za-z]{1,3}\.key)''',
]
